<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="repo-name" id="repoNameMeta" content="">
  <title>GitHub Apps • Secure Platform</title>
  <meta name="description" content="Minimalist secure file transfer"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌀</text></svg>">
  
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src https://fonts.gstatic.com;
    connect-src 'self' https:;
  "/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="background-overlay">
    <div class="gradient-sphere"></div>
    <div class="gradient-sphere-2"></div>
  </div>
  
  <div class="container">
    <div class="top-nav glass-effect">
      <button class="nav-btn" onclick="toggleInfoPopup()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 16v-4M12 8h.01"/>
        </svg>
        <span>Details</span>
      </button>
      
      <div class="nav-brand">
        GITHUB APPS
      </div>

      <div class="security-badge">
        <span class="dot">●</span>
        <span>SECURE</span>
      </div>
    </div>

    <div class="card glass-effect">
      <div class="card-body">
        <div class="icon-wrapper">
          <div class="icon-circle">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </div>
        </div>

        <h1>Preparing download</h1>
        <p class="subtitle">Establishing secure connection</p>

        <div class="progress-section">
          <div class="progress-bar glass-effect">
            <div class="progress-fill"></div>
          </div>
          <p id="status-text" class="status-text">Initializing...</p>
        </div>

        <p id="error-text" class="error-text"></p>

        <div class="features">
          <div class="feature-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <span>Encrypted</span>
          </div>
          <div class="feature-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 6v6l4 2"/>
            </svg>
            <span>Scanned</span>
          </div>
          <div class="feature-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M13 2L3 14h12l-2 8 10-12h-8z"/>
            </svg>
            <span>Fast</span>
          </div>
        </div>
      </div>

      <div class="card-footer">
        <span class="footer-text">end-to-end encryption</span>
      </div>
    </div>
  </div>

  <div id="infoPopup" class="info-panel glass-effect">
    <div class="info-panel-header" id="panelHeader">
      <span>Package information</span>
      <button class="close-btn" onclick="toggleInfoPopup()">×</button>
    </div>
    
    <div class="info-panel-content">
      <div class="info-grid">
        <div class="info-group">
          <span class="info-label">Version</span>
          <span class="info-value">Latest</span>
        </div>
        <div class="info-group">
          <span class="info-label">Type</span>
          <span class="info-value">Archive</span>
        </div>
        <div class="info-group">
          <span class="info-label">Downloads</span>
          <span class="info-value">2.4k</span>
        </div>
        <div class="info-group">
          <span class="info-label">Rating</span>
          <span class="info-value">4.93</span>
        </div>
      </div>

      <div class="security-status">
        <div class="status-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2">
            <path d="M20 6L9 17l-5-5"/>
          </svg>
          <span>Virus scan: clean</span>
        </div>
        <div class="status-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2">
            <path d="M20 6L9 17l-5-5"/>
          </svg>
          <span>SSL valid</span>
        </div>
        <div class="status-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2">
            <path d="M20 6L9 17l-5-5"/>
          </svg>
          <span>GitHub Verified</span>
        </div>
      </div>
    </div>

    <div class="info-panel-footer">
      <a href="https://github.com/login" target="_blank" class="auth-link">
        <span>Sign in with GitHub →</span>
      </a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
